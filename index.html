<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudentOS - Hệ Điều Hành Học Tập Thông Minh</title>
    
    <!-- Meta Descriptions for SEO -->
    <meta name="description" content="StudentOS - Hệ điều hành học tập thông minh giúp quản lý thời khóa biểu, deadline, theo dõi Pomodoro, dự đoán stress, gpa và mô phỏng kế hoạch học tập." />
    
    <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    
    <style>
      /* Prevent white flash during initial page load */
      html, body {
        background-color: #030014;
        margin: 0;
        padding: 0;
        font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-[#030014] text-slate-100 antialiased min-h-screen">
    <!-- Animated background nodes -->
    <div class="fixed inset-0 -z-50 overflow-hidden pointer-events-none">
      <div class="absolute -top-[40%] -left-[20%] w-[80vw] h-[80vw] rounded-full bg-purple-900/15 blur-[120px] animate-pulse" style="animation-duration: 15s;"></div>
      <div class="absolute -bottom-[30%] -right-[10%] w-[70vw] h-[70vw] rounded-full bg-indigo-900/15 blur-[100px] animate-pulse" style="animation-duration: 20s;"></div>
      <div class="absolute top-[30%] left-[40%] w-[35vw] h-[35vw] rounded-full bg-pink-900/10 blur-[90px] animate-pulse" style="animation-duration: 12s;"></div>
      
      <!-- Tech Grid background overlay -->
      <div class="absolute inset-0 bg-[linear-gradient(to_right,#1f293708_1px,transparent_1px),linear-gradient(to_bottom,#1f293708_1px,transparent_1px)] bg-[size:4rem_4rem]"></div>
    </div>
    
    <div id="root" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
